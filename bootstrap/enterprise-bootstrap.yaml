apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saikiran243/orbstack-gitops.git
    targetRevision: HEAD
    path: apps # This tells it to deploy everything in our apps/ folder!
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
