apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sys-kong
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.konghq.com
    chart: ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
