apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sys-istio-monitoring
  namespace: argocd
spec:
  project: default
  source:
    # Pointing directly to the official Istio repo!
    repoURL: https://github.com/istio/istio.git
    targetRevision: release-1.20
    path: samples/addons
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true