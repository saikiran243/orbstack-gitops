apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-echo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saikiran243/orbstack-gitops.git
    targetRevision: HEAD
    path: workloads/echo-server # Points to the echo folder!
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
