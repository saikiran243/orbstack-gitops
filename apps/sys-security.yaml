apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sys-security
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saikiran243/orbstack-gitops.git 
    targetRevision: HEAD
    path: workloads/security
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true