apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saikiran243/orbstack-gitops.git
    targetRevision: HEAD
    path: workloads/enterprise-app/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated:
      prune: true
  syncOptions:
    - CreateNamespace=true # <--- TELL ARGO TO CREATE IT